<!DOCTYPE html>
<html>
<head>
  <title>Inline CSS Form</title>
</head>
<body style="font-family: Arial; background-color: #f4f4f4; padding: 20px;">

  <div style="background: white; padding: 20px; width: 300px; border-radius: 10px;">
    
    <h2 style="text-align: center;">Contact Form</h2>

    <form>
      <label for="name">Name:</label><br>
      <input 
        type="text" 
        id="name" 
        name="name"
        style="width: 100%; padding: 8px; margin-top: 5px; margin-bottom: 10px;"
      ><br>

      <label for="email">Email:</label><br>
      <input 
        type="email" 
        id="email" 
        name="email"
        style="width: 100%; padding: 8px; margin-top: 5px; margin-bottom: 10px;"
      ><br>

      <label for="message">Message:</label><br>
      <textarea 
        id="message" 
        name="message"
        style="width: 100%; padding: 8px; margin-top: 5px; margin-bottom: 10px;"
      ></textarea><br>

      <input 
        type="submit" 
        value="Submit"
        style="background-color: blue; color: white; padding: 10px; border: none; cursor: pointer;"
      >
    </form>

  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Creative Morphing Pentagon</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: black;
            overflow: hidden;
        }
        /* glowing background */
        
        body::before {
            content: "";
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #00f7ff33, transparent 70%);
            animation: pulse 4s infinite;
        }
        /* Pentagon */
        
        .pentagon {
            position: relative;
            width: 120px;
            height: 120px;
            background: linear-gradient(45deg, #00f7ff, #ff00ea);
            clip-path: polygon( 50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
            animation: float 5s ease-in-out infinite, rotate 8s linear infinite, morph 4s ease-in-out infinite alternate;
            box-shadow: 0 0 20px #00f7ff, 0 0 50px #ff00ea;
        }
        /* floating movement */
        
        @keyframes float {
            0% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-40px);
            }
            100% {
                transform: translateY(0px);
            }
        }
        /* spinning */
        
        @keyframes rotate {
            from {
                rotate: 0deg;
            }
            to {
                rotate: 360deg;
            }
        }
        /* shape morphing */
        
        @keyframes morph {
            0% {
                clip-path: polygon( 50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
            }
            100% {
                clip-path: polygon( 50% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            }
        }
        /* glowing pulse */
        
        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.5;
            }
            50% {
                transform: scale(1.3);
                opacity: 1;
            }
            100% {
                transform: scale(1);
                opacity: 0.5;
            }
        }
    </style>
</head>

<body>

    <div class="pentagon"></div>

</body>

</html>

<!DOCTYPE html>
<html>

<head>
    <title>Simple Animation</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f0f0f0;
        }
        
        .ball {
            width: 100px;
            height: 100px;
            background: crimson;
            border-radius: 50%;
            animation: bounce 1s infinite alternate;
        }
        
        @keyframes bounce {
            from {
                transform: translateY(0);
            }
            to {
                transform: translateY(-200px);
            }
        }
    </style>
</head>

<body>

    <div class="ball"></div>

</body>

</html>

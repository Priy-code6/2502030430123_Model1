<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: skyblue;
        }
        /* Ocean */
        
        .ocean {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40%;
            background: #0077be;
        }
        /* Waves */
        
        .wave {
            position: absolute;
            width: 200%;
            height: 100px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 45%;
            top: -40px;
            animation: waveMove 6s linear infinite;
        }
        
        @keyframes waveMove {
            from {
                transform: translateX(0);
            }
            to {
                transform: translateX(-50%);
            }
        }
        /* Dolphin */
        
        .dolphin {
            position: absolute;
            bottom: 120px;
            left: -100px;
            width: 100px;
            height: 50px;
            background: gray;
            border-radius: 50px 50px 30px 30px;
            animation: dolphinJump 4s infinite ease-in-out;
        }
        /* Dolphin Tail */
        
        .dolphin::before {
            content: "";
            position: absolute;
            right: -20px;
            top: 10px;
            width: 20px;
            height: 20px;
            background: gray;
            clip-path: polygon(0 50%, 100% 0, 100% 100%);
        }
        /* Dolphin Fin */
        
        .dolphin::after {
            content: "";
            position: absolute;
            top: -10px;
            left: 40px;
            width: 20px;
            height: 20px;
            background: gray;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        }
        /* Jump Animation */
        
        @keyframes dolphinJump {
            0% {
                left: -120px;
                bottom: 120px;
                transform: rotate(0deg);
            }
            25% {
                bottom: 280px;
                transform: rotate(-20deg);
            }
            50% {
                left: 40%;
                bottom: 180px;
                transform: rotate(10deg);
            }
            75% {
                bottom: 80px;
                transform: rotate(30deg);
            }
            100% {
                left: 110%;
                bottom: 120px;
                transform: rotate(0deg);
            }
        }
    </style>
</head>

<body>

    <div class="ocean">
        <div class="wave"></div>
    </div>

    <div class="dolphin"></div>

</body>

</html>
